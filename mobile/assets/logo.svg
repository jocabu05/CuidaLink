<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DB5D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E8BA6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D5E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7FC3DB;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Círculo externo grande (azul oscuro) -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Anillo blanco -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="white" stroke-width="8"/>
  
  <!-- Círculo interno (azul claro) -->
  <circle cx="200" cy="200" r="170" fill="url(#innerGrad)"/>
  
  <!-- CORAZÓN grande en el centro -->
  <g>
    <!-- Corazón shape -->
    <path d="M 200 320
             C 120 260, 80 220, 80 160
             C 80 120, 110 90, 145 90
             C 170 90, 190 105, 200 125
             C 210 105, 230 90, 255 90
             C 290 90, 320 120, 320 160
             C 320 220, 280 260, 200 320 Z" 
          fill="none" stroke="#4DB5D9" stroke-width="3" opacity="0.6"/>
  </g>
  
  <!-- Red neuronal / patrones en el corazón (representan cuidado neurológico) -->
  <g opacity="0.5" stroke="#4DB5D9" stroke-width="1.5" fill="none">
    <!-- Conexiones izquierda -->
    <circle cx="130" cy="130" r="6" fill="#4DB5D9"/>
    <circle cx="140" cy="160" r="5" fill="#4DB5D9"/>
    <circle cx="130" cy="190" r="6" fill="#4DB5D9"/>
    <line x1="130" y1="130" x2="140" y2="160"/>
    <line x1="140" y1="160" x2="130" y2="190"/>
    
    <!-- Conexiones derecha -->
    <circle cx="270" cy="130" r="6" fill="#4DB5D9"/>
    <circle cx="260" cy="160" r="5" fill="#4DB5D9"/>
    <circle cx="270" cy="190" r="6" fill="#4DB5D9"/>
    <line x1="270" y1="130" x2="260" y2="160"/>
    <line x1="260" y1="160" x2="270" y2="190"/>
  </g>
  
  <!-- CUIDADORA (izquierda) - simplificada -->
  <g>
    <!-- Cabeza -->
    <circle cx="155" cy="140" r="12" fill="#2E8BA6" opacity="0.8"/>
    <!-- Cabello -->
    <path d="M 145 135 Q 155 128 165 135" fill="#1A5A75" opacity="0.9"/>
    <!-- Cuerpo -->
    <rect x="148" y="155" width="14" height="20" fill="#4DB5D9" opacity="0.8" rx="2"/>
    <!-- Brazos extendidos hacia mano de paciente -->
    <line x1="148" y1="160" x2="135" y2="165" stroke="#2E8BA6" stroke-width="2" opacity="0.8"/>
    <line x1="162" y1="160" x2="180" y2="175" stroke="#2E8BA6" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- PACIENTE (derecha) - simplificada -->
  <g>
    <!-- Cabeza -->
    <circle cx="245" cy="140" r="12" fill="#9B7B54" opacity="0.8"/>
    <!-- Cabello cano -->
    <path d="M 235 135 Q 245 128 255 135" fill="#C9A876" opacity="0.9"/>
    <!-- Cuerpo -->
    <rect x="238" y="155" width="14" height="20" fill="#4DB5D9" opacity="0.8" rx="2"/>
    <!-- Brazos extendidos hacia mano de cuidadora -->
    <line x1="252" y1="160" x2="265" y2="165" stroke="#9B7B54" stroke-width="2" opacity="0.8"/>
    <line x1="238" y1="160" x2="220" y2="175" stroke="#9B7B54" stroke-width="2" opacity="0.8"/>
  </g>
  
  <!-- Manos conectadas (símbolo de conexión/cuidado) -->
  <g>
    <!-- Mano cuidadora -->
    <circle cx="180" cy="177" r="4" fill="#2E8BA6" opacity="0.9"/>
    <!-- Mano paciente -->
    <circle cx="220" cy="177" r="4" fill="#9B7B54" opacity="0.9"/>
    <!-- Línea de conexión entre manos -->
    <line x1="184" y1="177" x2="216" y2="177" stroke="#F5A623" stroke-width="3" opacity="0.9"/>
  </g>
  
  <!-- INICIALES "CL" en el centro (en blanco) -->
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="48" font-weight="bold" 
        text-anchor="middle" fill="white" opacity="0.85">CL</text>
  
  <!-- Decoración: pequeña flor/brote (símbolo de vida) -->
  <g transform="translate(280, 110)">
    <circle cx="0" cy="0" r="3" fill="#F5A623"/>
    <circle cx="-4" cy="-3" r="2" fill="#F5A623" opacity="0.7"/>
    <circle cx="4" cy="-3" r="2" fill="#F5A623" opacity="0.7"/>
    <circle cx="-3" cy="4" r="2" fill="#F5A623" opacity="0.7"/>
    <circle cx="3" cy="4" r="2" fill="#F5A623" opacity="0.7"/>
  </g>
</svg>
