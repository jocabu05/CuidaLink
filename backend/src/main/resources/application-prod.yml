# ============================================================================
# CuidaLink — Perfil PRODUCCIÓN (Neon PostgreSQL en la nube)
# Activar con: mvn spring-boot:run -Dspring-boot.run.profiles=prod
# O con variable de entorno: SPRING_PROFILES_ACTIVE=prod
# ============================================================================

server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cuidalink}
    username: ${DATABASE_USER:}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data-postgres.sql
      continue-on-error: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT
jwt:
  secret: ${JWT_SECRET:CuidaLinkProdSecretKey2026AlzheimerCareAppSecureTokenGeneration256bit}
  expiration: ${JWT_EXPIRATION:86400000}

# CORS — añade aquí el dominio de tu frontend en producción
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:19006}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

logging:
  level:
    com.cuidalink: INFO
    org.springframework.security: WARN
