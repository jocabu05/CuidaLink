server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cuidalink?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:CuidaLinkSecretKey2024AlzheimerCareAppSecureTokenGenerationKeyMinimum256Bits}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds

# CORS Configuration
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:19006
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

# File upload limits for Base64 images
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

logging:
  level:
    com.cuidalink: DEBUG
    org.springframework.security: DEBUG
